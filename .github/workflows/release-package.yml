name: Package Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-package-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  package:
    runs-on: [self-hosted, windows]
    timeout-minutes: 60
    env:
      RELEASE_REPO: ${{ secrets.RELEASE_REPO }}
      RELEASE_REPO_TOKEN: ${{ secrets.RELEASE_REPO_TOKEN }}
      RELEASE_NUGET_SOURCES: ${{ secrets.RELEASE_NUGET_SOURCES }}
    steps:
      - name: Checkout dev repo
        uses: actions/checkout@v4

      - name: Policy guard (dist must be untracked)
        shell: pwsh
        run: .\scripts\ci\assert-dist-untracked.ps1

      - name: Validate release secrets
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace($env:RELEASE_REPO)) {
            throw "Missing required secret: RELEASE_REPO"
          }

          if ([string]::IsNullOrWhiteSpace($env:RELEASE_REPO_TOKEN)) {
            throw "Missing required secret: RELEASE_REPO_TOKEN"
          }

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Preflight (strict, release packaging mode)
        shell: pwsh
        run: .\scripts\preflight.ps1 -Strict -SkipAegpChecks

      - name: Build tools runtime (Release, no AEGP/package)
        shell: pwsh
        run: >
          .\scripts\ci\invoke-build-with-nuget-sources.ps1
          -BuildConfiguration Release
          -SkipAegp
          -SkipPackage
          -NuGetSourcesPrimary "$env:RELEASE_NUGET_SOURCES"

      - name: Package plugin
        shell: pwsh
        run: .\\scripts\\package_release.ps1 -Version $env:GITHUB_REF_NAME

      - name: Verify release zip layout
        shell: pwsh
        run: .\scripts\ci\assert-release-zip-layout.ps1 -Version $env:GITHUB_REF_NAME

      - name: Checkout release repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.RELEASE_REPO }}
          token: ${{ env.RELEASE_REPO_TOKEN }}
          path: release-repo

      - name: Publish to release repo
        shell: pwsh
        run: |
          $ver = $env:GITHUB_REF_NAME
          if ($ver.StartsWith("v")) { $ver = $ver.Substring(1) }
          $src = "dist\\CaptionPanels_${ver}_win.zip"
          if (!(Test-Path $src)) { throw "Missing artifact: $src" }

          $destDir = "release-repo\\releases\\v$ver"
          New-Item -ItemType Directory -Path $destDir -Force | Out-Null
          Copy-Item $src $destDir -Force
          (Get-FileHash $src -Algorithm SHA256).Hash | Out-File (Join-Path $destDir "sha256.txt") -Encoding ascii

          Push-Location release-repo
          git config user.name "release-bot"
          git config user.email "release-bot@users.noreply.github.com"
          git add .
          git commit -m "Release v$ver"
          if ($LASTEXITCODE -ne 0) { Write-Host "Nothing to commit"; exit 0 }
          git push
          Pop-Location
