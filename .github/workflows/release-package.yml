name: Package Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_version:
        description: "Release version (vMAJOR.MINOR.PATCH), for example v2.4.1"
        required: true
        type: string
      dry_run:
        description: "If true, skip publishing to release repo"
        required: true
        default: true
        type: boolean
      release_nuget_sources:
        description: "Optional NuGet source URLs for build.ps1 (-NuGetSource). Separators: comma, semicolon, newline."
        required: false
        type: string

concurrency:
  group: release-package-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  package:
    runs-on: ${{ fromJSON(github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run == 'true' && '["windows-latest"]' || '["self-hosted","windows"]') }}
    timeout-minutes: 60
    env:
      RELEASE_REPO: ${{ secrets.RELEASE_REPO }}
      RELEASE_REPO_TOKEN: ${{ secrets.RELEASE_REPO_TOKEN }}
      RELEASE_NUGET_SOURCES: ${{ secrets.RELEASE_NUGET_SOURCES }}
      RELEASE_NUGET_SOURCES_INPUT: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_nuget_sources || '' }}
      RELEASE_VERSION: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_version || github.ref_name }}
      RELEASE_DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run == 'true' && 'true' || 'false' }}
    steps:
      - name: Checkout dev repo
        uses: actions/checkout@v4

      - name: Policy guard (dist must be untracked)
        shell: pwsh
        run: .\scripts\ci\assert-dist-untracked.ps1

      - name: Validate release secrets
        if: ${{ env.RELEASE_DRY_RUN != 'true' }}
        shell: pwsh
        run: .\scripts\ci\assert-release-secrets.ps1

      - name: Validate release tag version
        shell: pwsh
        run: .\scripts\ci\assert-release-version.ps1 -Version $env:RELEASE_VERSION

      - name: Validate release version alignment
        shell: pwsh
        run: .\scripts\ci\assert-release-version-alignment.ps1 -Version $env:RELEASE_VERSION

      - name: Resolve release env
        shell: pwsh
        run: .\scripts\ci\resolve-release-env.ps1 -Version $env:RELEASE_VERSION -ExportToGitHubEnv

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Preflight (strict, release packaging mode)
        shell: pwsh
        run: .\scripts\preflight.ps1 -Strict -SkipAegpChecks

      - name: Build tools runtime (Release, no AEGP/package)
        shell: pwsh
        run: >
          .\scripts\ci\invoke-build-with-nuget-sources.ps1
          -BuildConfiguration Release
          -SkipAegp
          -SkipPackage
          -NuGetSourcesPrimary "$env:RELEASE_NUGET_SOURCES_INPUT"
          -NuGetSourcesFallback "$env:RELEASE_NUGET_SOURCES"

      - name: Package plugin
        shell: pwsh
        run: |
          if ($env:RELEASE_DRY_RUN -eq "true") {
            .\scripts\package_release.ps1 -Version $env:RELEASE_VERSION -AllowMissingAex
          } else {
            .\scripts\package_release.ps1 -Version $env:RELEASE_VERSION
          }

      - name: Verify release zip layout
        shell: pwsh
        run: |
          if ($env:RELEASE_DRY_RUN -eq "true") {
            .\scripts\ci\assert-release-zip-layout.ps1 -Version $env:RELEASE_VERSION -AllowMissingAex
          } else {
            .\scripts\ci\assert-release-zip-layout.ps1 -Version $env:RELEASE_VERSION
          }

      - name: Upload release zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: CaptionPanels-release-${{ env.RELEASE_VERSION }}
          path: ${{ env.RELEASE_ZIP_PATH }}
          if-no-files-found: error
          retention-days: 14

      - name: Dry-run mode summary
        if: ${{ env.RELEASE_DRY_RUN == 'true' }}
        shell: pwsh
        run: |
          Write-Host "Release dry-run mode is enabled."
          Write-Host "Publish to release repo is skipped."
          Write-Host ("Release artifact: {0}" -f $env:RELEASE_ZIP_PATH)

      - name: Checkout release repo
        if: ${{ env.RELEASE_DRY_RUN != 'true' }}
        uses: actions/checkout@v4
        with:
          repository: ${{ env.RELEASE_REPO }}
          token: ${{ env.RELEASE_REPO_TOKEN }}
          path: release-repo

      - name: Publish to release repo
        if: ${{ env.RELEASE_DRY_RUN != 'true' }}
        shell: pwsh
        run: .\scripts\ci\publish-release-artifact.ps1 -Version $env:RELEASE_VERSION
