name: Package Release

on:
  push:
    tags:
      - "v*"

jobs:
  package:
    runs-on: [self-hosted, windows]
    env:
      RELEASE_NUGET_SOURCES: ${{ secrets.RELEASE_NUGET_SOURCES }}
    steps:
      - name: Checkout dev repo
        uses: actions/checkout@v4

      - name: Policy guard (dist must be untracked)
        shell: pwsh
        run: |
          $trackedDist = git ls-files -- dist
          if (-not [string]::IsNullOrWhiteSpace($trackedDist)) {
            Write-Host $trackedDist
            throw "Policy violation: dist/ contains tracked files. dist/ must remain build output only."
          }

      - name: Preflight (strict, release packaging mode)
        shell: pwsh
        run: .\scripts\preflight.ps1 -Strict -SkipAegpChecks

      - name: Build tools runtime (Release, no AEGP/package)
        shell: pwsh
        run: |
          $buildArgs = @("-Configuration", "Release", "-SkipAegp", "-SkipPackage")

          if (-not [string]::IsNullOrWhiteSpace($env:RELEASE_NUGET_SOURCES)) {
            $sources = @(
              $env:RELEASE_NUGET_SOURCES -split "[,;`r`n]+" |
              ForEach-Object { $_.Trim() } |
              Where-Object { -not [string]::IsNullOrWhiteSpace($_) }
            )

            foreach ($source in $sources) {
              $buildArgs += @("-NuGetSource", $source)
            }
          }

          & .\scripts\build.ps1 @buildArgs

      - name: Package plugin
        shell: pwsh
        run: .\\scripts\\package_release.ps1 -Version $env:GITHUB_REF_NAME

      - name: Verify release zip layout
        shell: pwsh
        run: |
          $ver = $env:GITHUB_REF_NAME
          if ($ver.StartsWith("v")) { $ver = $ver.Substring(1) }

          $zipPath = "dist\\CaptionPanels_${ver}_win.zip"
          if (!(Test-Path -LiteralPath $zipPath)) { throw "Missing artifact: $zipPath" }

          $extractRoot = Join-Path $env:RUNNER_TEMP ("CaptionPanels_zip_verify_" + [guid]::NewGuid().ToString("N"))
          New-Item -ItemType Directory -Path $extractRoot -Force | Out-Null
          Expand-Archive -LiteralPath $zipPath -DestinationPath $extractRoot -Force

          $required = @(
            "plugin\\CaptionPanels.aex",
            "plugin\\client\\index.html",
            "plugin\\host\\index.jsx",
            "plugin\\config.json",
            "plugin\\speakers.json",
            "tools\\word2json\\README.md",
            "tools\\word2json\\word2json.exe",
            "tools\\word2json\\word2json.rules.json",
            "tools\\word2json\\runtime\\win-x64\\self-contained\\word2json.exe",
            "tools\\transcribe_align\\transcribe_align.py",
            "config.default.json",
            "BUILDINFO.txt"
          )

          foreach ($relativePath in $required) {
            $fullPath = Join-Path $extractRoot $relativePath
            if (!(Test-Path -LiteralPath $fullPath)) {
              throw "Missing expected path in release zip: $relativePath"
            }
          }

      - name: Checkout release repo
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.RELEASE_REPO }}
          token: ${{ secrets.RELEASE_REPO_TOKEN }}
          path: release-repo

      - name: Publish to release repo
        shell: pwsh
        run: |
          $ver = $env:GITHUB_REF_NAME
          if ($ver.StartsWith("v")) { $ver = $ver.Substring(1) }
          $src = "dist\\CaptionPanels_${ver}_win.zip"
          if (!(Test-Path $src)) { throw "Missing artifact: $src" }

          $destDir = "release-repo\\releases\\v$ver"
          New-Item -ItemType Directory -Path $destDir -Force | Out-Null
          Copy-Item $src $destDir -Force
          (Get-FileHash $src -Algorithm SHA256).Hash | Out-File (Join-Path $destDir "sha256.txt") -Encoding ascii

          Push-Location release-repo
          git config user.name "release-bot"
          git config user.email "release-bot@users.noreply.github.com"
          git add .
          git commit -m "Release v$ver"
          if ($LASTEXITCODE -ne 0) { Write-Host "Nothing to commit"; exit 0 }
          git push
          Pop-Location
