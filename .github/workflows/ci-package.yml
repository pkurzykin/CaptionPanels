name: CI Package

on:
  pull_request:
    paths:
      - ".github/workflows/ci-package.yml"
      - "scripts/**"
      - "cep_src/**"
      - "tools/**"
  workflow_dispatch:
    inputs:
      ci_nuget_sources:
        description: "Optional NuGet source URLs for build.ps1 (-NuGetSource). Separators: comma, semicolon, newline."
        required: false
        type: string

concurrency:
  group: ci-package-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  package-dist:
    runs-on: windows-latest
    timeout-minutes: 35
    env:
      CI_NUGET_SOURCES_INPUT: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.ci_nuget_sources || '' }}
      CI_NUGET_SOURCES: ${{ vars.CI_NUGET_SOURCES }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Policy guard (dist must be untracked)
        shell: pwsh
        run: .\scripts\ci\assert-dist-untracked.ps1

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Preflight (strict, CI packaging mode)
        shell: pwsh
        run: .\scripts\preflight.ps1 -Strict -SkipAegpChecks

      - name: Verify release env resolver
        shell: pwsh
        run: .\scripts\ci\assert-release-env-resolution.ps1

      - name: Build and package (Release, no AEGP)
        shell: pwsh
        run: >
          .\scripts\ci\invoke-build-with-nuget-sources.ps1
          -BuildConfiguration Release
          -SkipAegp
          -AllowMissingAex
          -NuGetSourcesPrimary "$env:CI_NUGET_SOURCES_INPUT"
          -NuGetSourcesFallback "$env:CI_NUGET_SOURCES"

      - name: Verify dist layout
        shell: pwsh
        run: .\scripts\ci\assert-dist-layout.ps1

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: CaptionPanels-dist
          path: dist/CaptionPanels
          if-no-files-found: error
          retention-days: 14
