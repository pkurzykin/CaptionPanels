name: CI Package

on:
  pull_request:
    paths:
      - ".github/workflows/ci-package.yml"
      - "scripts/**"
      - "cep_src/**"
      - "tools/**"
  workflow_dispatch:
    inputs:
      ci_nuget_sources:
        description: "Optional NuGet source URLs for build.ps1 (-NuGetSource). Separators: comma, semicolon, newline."
        required: false
        type: string

concurrency:
  group: ci-package-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  package-dist:
    runs-on: windows-latest
    timeout-minutes: 35
    env:
      CI_NUGET_SOURCES_INPUT: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.ci_nuget_sources || '' }}
      CI_NUGET_SOURCES: ${{ vars.CI_NUGET_SOURCES }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Policy guard (dist must be untracked)
        shell: pwsh
        run: |
          $trackedDist = git ls-files -- dist
          if (-not [string]::IsNullOrWhiteSpace($trackedDist)) {
            Write-Host $trackedDist
            throw "Policy violation: dist/ contains tracked files. dist/ must remain build output only."
          }

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Preflight (strict, CI packaging mode)
        shell: pwsh
        run: .\scripts\preflight.ps1 -Strict -SkipAegpChecks

      - name: Build and package (Release, no AEGP)
        shell: pwsh
        run: |
          $buildArgs = @("-Configuration", "Release", "-SkipAegp", "-AllowMissingAex")

          $nugetSourcesRaw = $env:CI_NUGET_SOURCES_INPUT
          if ([string]::IsNullOrWhiteSpace($nugetSourcesRaw)) {
            $nugetSourcesRaw = $env:CI_NUGET_SOURCES
          }

          if (-not [string]::IsNullOrWhiteSpace($nugetSourcesRaw)) {
            $sources = @(
              $nugetSourcesRaw -split "[,;`r`n]+" |
              ForEach-Object { $_.Trim() } |
              Where-Object { -not [string]::IsNullOrWhiteSpace($_) }
            )

            foreach ($source in $sources) {
              $buildArgs += @("-NuGetSource", $source)
            }
          }

          & .\scripts\build.ps1 @buildArgs

      - name: Verify dist layout
        shell: pwsh
        run: |
          $required = @(
            "dist/CaptionPanels/plugin/client/index.html",
            "dist/CaptionPanels/plugin/host/index.jsx",
            "dist/CaptionPanels/plugin/config.json",
            "dist/CaptionPanels/plugin/speakers.json",
            "dist/CaptionPanels/tools/word2json/README.md",
            "dist/CaptionPanels/tools/word2json/word2json.exe",
            "dist/CaptionPanels/tools/word2json/word2json.rules.json",
            "dist/CaptionPanels/tools/word2json/runtime/win-x64/self-contained/word2json.exe",
            "dist/CaptionPanels/tools/transcribe_align/transcribe_align.py",
            "dist/CaptionPanels/config.default.json",
            "dist/CaptionPanels/BUILDINFO.txt"
          )

          foreach ($path in $required) {
            if (!(Test-Path -LiteralPath $path)) {
              throw "Missing expected path: $path"
            }
          }

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: CaptionPanels-dist
          path: dist/CaptionPanels
          if-no-files-found: error
          retention-days: 14
