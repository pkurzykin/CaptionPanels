<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <link rel="stylesheet" href="style.css">
    <title>News Helper</title>
</head>
<body>

    <div class="header">
        <button id="btn-load-word">📄 Load Word</button>
        <button id="btn-deep-clean">🧹 FixTypography</button>
        <button id="btn-reload">⟳ Reload</button>
        <button id="btn-settings">⚙ Settings</button>
    </div>

    <div class="tabs">
        <button class="tab-link active" onclick="openTab(event, 'subtitles')">Subtitles / Info</button>
        <button class="tab-link" onclick="openTab(event, 'titles')">Speaker Titles</button>
    </div>

    <div id="subtitles" class="tab-content active">
    
        <textarea id="sub-text" placeholder="Вставьте текст для субтитров..."></textarea>
        <div class="sub-controls-row">
            <button id="btn-clear-sub" class="secondary-btn">Clear</button>

            <div class="inline-toggle">
                <input type="checkbox" id="chk-playhead-jump">
                <label for="chk-playhead-jump">Playhead jump</label>
            </div>
        </div>



    <div class="panel-group">
        <label>Генерация Субтитров (Ручная)</label>
        <div class="row">
            <button id="btn-gen-regular">Regular</button>
            <button id="btn-gen-italic">Italic</button>
        </div>
    </div>

    <div class="panel-group">
        <label>Auto Timing</label>
        <button id="btn-auto-timing-whisperx" class="full-width">Auto Timing (WhisperX)</button>
    </div>

    <div class="panel-group">
    <label>Инфо-плашки (Ручной ввод)</label>

    <div class="input-block">
        <div class="clearable">
            <input type="text" id="input-head-title" placeholder="Название сюжета (HEAD)">
            <button type="button" class="clear-btn" data-clear="input-head-title">✕</button>
        </div>

        <div class="clearable topic-field" id="topic-field">
            <input type="text" id="input-head-topic" placeholder="Название рубрики (TOPIC)">
            <button type="button" class="dropdown-btn" id="btn-topic-dropdown" aria-label="Выбрать рубрику">▾</button>
            <button type="button" class="clear-btn" data-clear="input-head-topic">✕</button>
            <div id="topic-dropdown" class="topic-dropdown"></div>
        </div>
    </div>

    <div class="input-block" style="margin-top: 10px; border-top: 1px dashed #444; padding-top: 10px;">
        <div class="clearable">
            <input type="text" id="input-geotag" placeholder="GEOTAG">
            <button type="button" class="clear-btn" data-clear="input-geotag">✕</button>
        </div>
    </div>

    <button id="btn-create-branding" class="full-width">Create Branding</button>
    </div>

</div>

    <div id="titles" class="tab-content">
        <button id="btn-open-database" class="full-width">Speakers DB</button>
        <button id="btn-load-speaker" class="full-width secondary-btn">Load Speaker</button>
        
        <div class="input-block">
            <label>ФИО:</label>
            <textarea id="input-name" class="high-input"></textarea>
        </div>
        
        <div class="input-block">
            <label>Должность:</label>
            <textarea id="input-job" class="high-input"></textarea>
        </div>

        <button id="btn-clear-spk" class="secondary-btn right">Clear</button>
        <div style="clear: both;"></div>

        <div class="settings-grid">
            <div class="setting-box">
                <label>Сторона</label>
                <div class="radio-group">
                    <input type="radio" name="side" id="side-left" value="left" checked> 
                    <label for="side-left">Left</label>
                    
                    <input type="radio" name="side" id="side-right" value="right"> 
                    <label for="side-right">Right</label>
                </div>
            </div>
            <div class="setting-box">
                <label>Размер</label>
                <div class="radio-group">
                    <input type="radio" name="size" id="size-def" value="def" checked> 
                    <label for="size-def">Def</label>
                    
                    <input type="radio" name="size" id="size-short" value="short"> 
                    <label for="size-short">Short</label>
                </div>
            </div>
        </div>

        <div class="inline-toggle" style="margin-top: 8px;">
            <input type="checkbox" id="chk-solo-title">
            <label for="chk-solo-title">solo_title</label>
        </div>

        <div class="slider-group">
            <label>BG Offset: <span id="bg-val">0</span></label>
            <input type="range" id="bg-slider" min="-1500" max="1500" value="0">
        </div>

        <button id="btn-add-speaker" class="secondary-btn full-width" disabled>Add to DB</button>
        <button id="btn-create-title" class="main-action">Create Title</button>
        
        <div class="footer-actions">
            <button id="btn-trim">Trim</button>
        </div>
    </div>

<!-- ===== Speakers Database Modal ===== -->
<div id="db-overlay" class="modal-overlay" style="display:none;">
    <div class="modal-window">
        <div class="modal-header">
            <div class="modal-title">Speakers DB</div>
            <button id="btn-db-close" class="modal-close">✕</button>
        </div>

        <div class="modal-body">
            <div class="modal-footer">
            <button id="btn-db-add" class="main-action" style="margin:0;">Add</button>
            </div>
            <input id="db-search" type="text" placeholder="Поиск по ФИО..." />
            <div id="db-list" class="db-list">
                <!-- список будет заполняться из main.js -->
            </div>
        </div>
    </div>
</div>
<!-- ===== /Speakers Database Modal ===== -->

<!-- ===== FixTypography Modal ===== -->
<div id="typo-overlay" class="modal-overlay" style="display:none;">
    <div class="modal-window typo-window">
        <div class="modal-header">
            <div class="modal-title">FixTypography — найдено: <span id="typo-count">0</span></div>
            <button id="btn-typo-close" class="modal-close">✕</button>
        </div>

        <div class="modal-body">

            <div class="modal-footer" style="display:flex; gap:8px; justify-content:space-between;">
                <button id="btn-typo-fix-all" class="main-action" style="margin:0; flex:1;">Fix all</button>
                <button id="btn-typo-fix-except" class="secondary-btn" style="margin:0; flex:1;">Fix except selected</button>
            </div>
            <div class="typo-hint">Отметьте строки, которые не нужно исправлять.</div>
            <div id="typo-list" class="typo-list"></div>
        </div>
    </div>
</div>
<!-- ===== /FixTypography Modal ===== -->

<!-- ===== Settings Modal ===== -->
<div id="settings-overlay" class="modal-overlay" style="display:none;">
    <div class="modal-window settings-window">
        <div class="modal-header">
            <div class="modal-title">Settings</div>
            <button id="btn-settings-close" class="modal-close">✕</button>
        </div>

        <div class="modal-body">
            <div class="settings-row">
                <label for="settings-chars">Subtitle chars/line</label>
                <input id="settings-chars" type="text" inputmode="numeric" placeholder="60" />
            </div>


            <div class="settings-row">
                <label for="settings-short-word-len">Short word max len</label>
                <input id="settings-short-word-len" type="text" inputmode="numeric" placeholder="3" />
            </div>
            <div class="settings-row">
                <label for="settings-speakers-path">Speakers DB (speakers.json)</label>
                <div class="settings-path-row">
                    <input id="settings-speakers-path" type="text" placeholder="H:/.../speakers.json or C:/.../speakers.json" />
                    <button id="btn-settings-browse-speakers" type="button" class="secondary-btn">Browse</button>
                </div>
            </div>

            <div class="settings-row">
                <label for="settings-topics">Topics (one per line)</label>
                <textarea id="settings-topics" rows="6" placeholder="One rubric per line"></textarea>
            </div>


            <details class="settings-details">
                <summary>ASR (WhisperX)</summary>

                <div class="settings-row">
                    <label for="settings-whisperx-model">Model</label>
                    <select id="settings-whisperx-model">
                        <option value="small">small</option>
                        <option value="medium">medium</option>
                        <option value="large-v3">large-v3</option>
                    </select>
                </div>

                <div class="settings-row">
                    <label for="settings-whisperx-language">Language</label>
                    <input id="settings-whisperx-language" type="text" placeholder="ru" />
                </div>

                <div class="settings-row">
                    <label for="settings-whisperx-device-mode">Device mode</label>
                    <select id="settings-whisperx-device-mode">
                        <option value="auto">auto (CUDA -> CPU fallback)</option>
                        <option value="cuda">cuda only</option>
                        <option value="cpu">cpu only</option>
                    </select>
                </div>

                <details class="settings-details settings-details-nested">
                    <summary>Advanced params</summary>

                    <div class="settings-row">
                        <label class="settings-checkbox">
                            <input id="settings-whisperx-adv-enabled" type="checkbox" />
                            Use advanced args
                        </label>
                        <div class="settings-note">If disabled, only model/language/device/VAD are used.</div>
                    </div>

                    <div class="settings-row">
                        <label for="settings-whisperx-beam">beam_size</label>
                        <input id="settings-whisperx-beam" type="text" inputmode="numeric" placeholder="5" />
                    </div>

                    <div class="settings-row">
                        <label for="settings-whisperx-temp">temperature</label>
                        <input id="settings-whisperx-temp" type="text" placeholder="0.0" />
                    </div>

                    <div class="settings-row">
                        <label for="settings-whisperx-nospeech">no_speech_threshold</label>
                        <input id="settings-whisperx-nospeech" type="text" placeholder="0.6" />
                    </div>

                    <div class="settings-row">
                        <label for="settings-whisperx-logprob">logprob_threshold</label>
                        <input id="settings-whisperx-logprob" type="text" placeholder="-1.0" />
                    </div>

                    <div class="settings-row">
                        <label class="settings-checkbox">
                            <input id="settings-whisperx-condprev" type="checkbox" />
                            condition_on_previous_text
                        </label>
                    </div>

                    <div class="settings-row">
                        <label for="settings-whisperx-extra">extra args (raw)</label>
                        <input id="settings-whisperx-extra" type="text" placeholder="--beam_size 5 ..." />
                        <div class="settings-note">Optional escape hatch: appended to the WhisperX command as-is.</div>
                    </div>
                </details>
            </details>

            <div class="modal-footer" style="display:flex; gap:8px; justify-content:space-between;">
                <button id="btn-settings-save" class="main-action" style="margin:0; flex:1;">Save</button>
                <button id="btn-settings-cancel" class="secondary-btn" style="margin:0; flex:1;">Cancel</button>
            </div>
        </div>
    </div>
</div>
<!-- ===== /Settings Modal ===== -->

<!-- ===== Task Progress Modal ===== -->
<div id="task-progress-overlay" class="modal-overlay" style="display:none;">
    <div class="modal-window progress-window">
        <div class="modal-header">
            <div class="modal-title" id="task-progress-title">Processing...</div>
        </div>
        <div class="modal-body">
            <div class="progress-bar-wrap">
                <div class="progress-bar-fill" id="task-progress-fill"></div>
            </div>
            <div class="progress-caption" id="task-progress-caption">Please wait...</div>
        </div>
    </div>
</div>
<!-- ===== /Task Progress Modal ===== -->


    <div class="ui-version">v<span id="ui-version">2.3.1</span></div>

    <script src="js/CSInterface.js"></script>
    <script src="js/bridge.js"></script>
    <script src="js/app_core.js"></script>
    <script src="js/speakers_db.js"></script>
    <script src="js/ui_tabs.js"></script>
    <script src="js/ui_topics.js"></script>
    <script src="js/ui_import.js"></script>
    <script src="js/ui_speakers.js"></script>
    <script src="js/ui_auto_timing.js"></script>
    <script src="js/ui_subtitles.js"></script>
    <script src="js/ui_typography.js"></script>
    <script src="js/ui_branding.js"></script>
    <script src="js/ui_settings.js"></script>
    <script src="js/host_loader.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
